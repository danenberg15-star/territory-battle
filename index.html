<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Territory Battle</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Base Styles */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; background-color: #0f172a; color: white; user-select: none; -webkit-user-select: none; }
        #map { height: 100%; width: 100%; position: absolute; top: 0; z-index: 1; display: none; }
        
        /* Screens */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #0f172a; padding: 20px; box-sizing: border-box; }
        #lobby-screen { display: none; justify-content: flex-start; padding-top: 50px; }
        
        /* Components */
        h1 { color: #38bdf8; font-size: 28px; margin-bottom: 30px; text-align: center; }
        h2 { color: #e2e8f0; font-size: 20px; margin-bottom: 15px; }
        input { width: 100%; max-width: 300px; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #38bdf8; background: #1e293b; color: white; font-size: 18px; text-align: center; box-sizing: border-box; user-select: auto; }
        
        .btn { width: 100%; max-width: 300px; padding: 18px; border-radius: 12px; border: none; font-size: 18px; font-weight: bold; color: white; cursor: pointer; margin-bottom: 15px; transition: 0.2s; }
        .btn-blue { background: #1e40af; }
        .btn-red { background: #991b1b; }
        .btn-green { background: #10b981; font-size: 15px; padding: 15px; }

        /* Setup Territory UI (Host Only) */
        #setup-ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 2600; width: 90%; max-width: 400px; display: none; flex-direction: column; gap: 10px; }
        .setup-msg { background: rgba(30, 41, 59, 0.95); padding: 15px; border-radius: 12px; border: 1px solid #38bdf8; text-align: center; font-size: 14px; }
        
        /* In-Game UI */
        .exit-btn { position: absolute; top: 15px; left: 15px; z-index: 3000; background: rgba(220, 38, 38, 0.9); color: white; border: 2px solid white; border-radius: 50%; width: 40px; height: 40px; font-weight: bold; cursor: pointer; display: none; align-items: center; justify-content: center; }
        .header { position: absolute; top: 10px; left: 10px; right: 10px; padding: 10px; background: rgba(15, 23, 42, 0.95); border-radius: 12px; text-align: center; z-index: 2000; border: 1px solid #38bdf8; display: none; }
        .status-row { display: flex; justify-content: space-around; font-size: 11px; font-weight: bold; }
        
        /* Briefing UI */
        #briefing-overlay { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); z-index: 2500; background: rgba(30, 41, 59, 0.9); padding: 15px 25px; border-radius: 50px; border: 2px solid #facc15; display: none; text-align: center; width: 80%; max-width: 300px; }
        #briefing-timer-text { font-size: 22px; font-weight: bold; color: #facc15; }

        /* Controls */
        #controls-container { display: none; position: absolute; bottom: 10px; left: 0; right: 0; z-index: 2000; padding: 10px; pointer-events: none; }
        #capture-btn-container { position: relative; width: 110px; height: 110px; margin: 0 auto 15px auto; pointer-events: auto; display: none; }
        #capture-btn { position: absolute; top: 5px; left: 5px; width: 100px; height: 100px; background: #dc2626; color: white; border: none; border-radius: 50%; font-weight: bold; font-size: 18px; z-index: 5; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #capture-btn.active-sonar { animation: sonar-pulse 1s infinite; border: 4px solid #fff; }
        @keyframes sonar-pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        #capture-btn.cooldown { background: transparent; color: #dc2626; border: 2px solid rgba(220, 38, 38, 0.2); }
        .progress-ring { position: absolute; top: 0; left: 0; width: 110px; height: 110px; transform: rotate(-90deg); z-index: 1; }
        .progress-ring__circle { stroke: #dc2626; stroke-width: 6; fill: transparent; stroke-dasharray: 326.7; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; }

        /* Victory Screen */
        #victory-screen { display: none; z-index: 4000; text-align: center; justify-content: center; align-items: center; }
        .trophy-icon { font-size: 100px; margin-bottom: 20px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>
    <button id="lang-toggle" onclick="toggleLanguage()" style="position:absolute; top:15px; right:15px; z-index:3001; background:#1e293b; color:white; border-radius:50%; width:40px; height:40px; border:1px solid #38bdf8;">🌐</button>

    <!-- Login -->
    <div id="login-screen" class="screen">
        <h1 id="lbl-main-title">Territory Battle</h1>
        <input type="text" id="player-name" placeholder="הכנס שם שחקן" />
        <input type="number" id="room-code-input" placeholder="קוד חדר" />
        <button class="btn btn-blue" id="btn-join" onclick="joinRoom()">הצטרף</button>
        <button class="btn btn-red" id="btn-create" onclick="createRoom()">צור חדר</button>
    </div>

    <!-- Lobby -->
    <div id="lobby-screen" class="screen">
        <h2 id="lbl-lobby-title">לובי</h2>
        <div id="display-room-code" style="font-size:24px; font-weight:bold; color:#38bdf8; margin-bottom:20px;">----</div>
        <div style="display:flex; width:100%; gap:10px; flex-grow:1;">
            <div id="list-cops" class="team-list" style="flex:1; border:1px solid #3b82f6; border-radius:12px; padding:10px;">
                <div id="lbl-cops" style="color:#3b82f6; text-align:center;">שוטרים</div>
                <div id="players-cops"></div>
            </div>
            <div id="list-thieves" class="team-list" style="flex:1; border:1px solid #ef4444; border-radius:12px; padding:10px;">
                <div id="lbl-thieves" style="color:#ef4444; text-align:center;">גנבים</div>
                <div id="players-thieves"></div>
            </div>
        </div>
        <button class="btn btn-green" id="btn-start-game" style="display:none;" onclick="startGame()">התחל משחק</button>
    </div>

    <!-- Area Setup UI (Host Only) -->
    <div id="setup-ui">
        <div class="setup-msg" id="setup-msg">סמן לפחות 3 נקודות על המפה כדי להגדיר את זירת המשחק</div>
        <button class="btn btn-blue" id="btn-confirm-arena" onclick="confirmArena()" style="display:none;">אשר זירה וקבע תחנה</button>
    </div>

    <!-- Game UI -->
    <button id="exit-btn" class="exit-btn" onclick="exitGame()">X</button>
    <div class="header" id="game-header">
        <div class="status-row">
            <span id="gps-status">GPS ❌</span>
            <span id="players-count">שחקנים: 0</span>
        </div>
    </div>

    <div id="briefing-overlay">
        <div id="briefing-timer-text">00:30</div>
        <div id="briefing-status">ממתין לשוטרים בתחנה...</div>
    </div>

    <div id="map"></div>

    <div id="controls-container">
        <div id="capture-btn-container">
            <svg class="progress-ring"><circle class="progress-ring__circle" id="cooldown-circle" cx="55" cy="55" r="52"></circle></svg>
            <button id="capture-btn" onclick="triggerCapture()">
                <span class="btn-label" id="lbl-capture">תפוס!</span>
                <span class="timer-text" id="cooldown-timer">60</span>
            </button>
        </div>
    </div>

    <!-- Victory -->
    <div id="victory-screen" class="screen">
        <div class="trophy-icon">🏆</div>
        <h1 id="victory-title">ניצחון!</h1>
        <button class="btn btn-blue" onclick="location.reload()">חזור ללובי</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    
    <script src="audio.js"></script>
    <script src="territory.js"></script>
    <script src="firebase-init.js"></script>
    <script src="lobby.js"></script>
    <script src="victory.js"></script>
    <script src="game.js"></script>
</body>
</html>
