<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Territory Battle</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Base Styles */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; background-color: #f8fafc; color: #1e293b; user-select: none; -webkit-user-select: none; }
        #map { height: 100%; width: 100%; position: absolute; top: 0; z-index: 1; display: none; }
        
        /* Drawing Layer */
        #drawing-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2500; display: none; background: rgba(255, 255, 255, 0.1); touch-action: none; }
        #drawing-canvas { width: 100%; height: 100%; cursor: crosshair; }
        
        /* Screens */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #0f172a; padding: 20px; box-sizing: border-box; color: white; }
        #lobby-screen { display: none; justify-content: flex-start; padding-top: 50px; }
        
        /* Components */
        h1 { color: #38bdf8; font-size: 28px; margin-bottom: 30px; text-align: center; }
        input { width: 100%; max-width: 300px; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #38bdf8; background: #1e293b; color: white; font-size: 18px; text-align: center; box-sizing: border-box; user-select: auto; }
        
        .btn { width: 100%; max-width: 300px; padding: 18px; border-radius: 12px; border: none; font-size: 18px; font-weight: bold; color: white; cursor: pointer; margin-bottom: 15px; transition: 0.2s; text-align: center; display: flex; align-items: center; justify-content: center; }
        .btn-blue { background: #1e40af; }
        .btn-red { background: #991b1b; }
        .btn-green { background: #10b981; font-size: 15px; padding: 12px; max-width: 350px; width: 100%; margin-top: 10px; }
        
        /* Compass Map Controls (Host ONLY Setup) */
        #map-controls { position: absolute; left: 15px; bottom: 80px; z-index: 3000; display: none; flex-direction: column; align-items: center; gap: 5px; }
        .compass-row { display: flex; gap: 5px; }
        .ctrl-btn { width: 45px; height: 45px; background: rgba(255, 255, 255, 0.9); border: 2px solid #1e40af; color: #1e40af; border-radius: 10px; font-size: 22px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; pointer-events: auto; }
        .ctrl-btn:active { background: #1e40af; color: white; }

        /* Zoom Controls (Host ONLY Setup) */
        #zoom-controls { position: absolute; right: 15px; bottom: 80px; z-index: 3000; display: none; flex-direction: column; gap: 8px; }

        /* Setup UI Footer */
        #setup-ui { position: absolute; bottom: 0; left: 0; right: 0; z-index: 3000; background: rgba(255, 255, 255, 0.95); border-top: 2px solid #1e40af; padding: 10px 15px; display: none; align-items: center; justify-content: space-between; gap: 10px; height: 65px; box-sizing: border-box; }
        .setup-msg { font-size: 12px; color: #1e293b; font-weight: bold; flex: 1; text-align: right; }
        .setup-actions { display: flex; gap: 8px; }
        .setup-btn { padding: 10px 15px; border-radius: 8px; font-size: 13px; font-weight: bold; border: none; color: white; cursor: pointer; }

        /* In-Game UI */
        .exit-btn { position: absolute; top: 15px; left: 15px; z-index: 3100; background: rgba(220, 38, 38, 0.9); color: white; border: 2px solid white; border-radius: 50%; width: 40px; height: 40px; font-weight: bold; font-size: 20px; cursor: pointer; display: none; align-items: center; justify-content: center; }
        .header { position: absolute; top: 10px; left: 10px; right: 10px; padding: 10px; background: rgba(255, 255, 255, 0.95); border-radius: 12px; text-align: center; z-index: 2000; border: 1px solid #1e40af; display: none; }
        .status-row { display: flex; justify-content: space-around; font-size: 11px; font-weight: bold; color: #475569; }
        #gps-status { color: #dc2626; }
        #players-count { color: #059669; }
        
        /* Briefing UI */
        #briefing-overlay { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); z-index: 2500; background: rgba(30, 41, 59, 0.9); padding: 15px 25px; border-radius: 50px; border: 2px solid #facc15; display: none; text-align: center; width: 80%; max-width: 300px; color: white; }

        /* Controls */
        #controls-container { display: none; position: absolute; bottom: 10px; left: 0; right: 0; z-index: 2000; padding: 10px; pointer-events: none; }
        #capture-btn-container { position: relative; width: 110px; height: 110px; margin: 0 auto 15px auto; pointer-events: auto; display: none; }
        #capture-btn { position: absolute; top: 5px; left: 5px; width: 100px; height: 100px; background: #dc2626; color: white; border: none; border-radius: 50%; font-weight: bold; font-size: 18px; z-index: 5; cursor: pointer; }
        
        /* Victory Screen */
        #victory-screen { display: none; z-index: 4000; text-align: center; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>
    <button id="lang-toggle" onclick="toggleLanguage()" style="position:absolute; top:15px; right:15px; z-index:3101; background:white; color:#1e40af; border-radius:50%; width:40px; height:40px; border:1px solid #1e40af; font-weight:bold;">🌐</button>

    <!-- 1. Login -->
    <div id="login-screen" class="screen">
        <h1 id="lbl-main-title">Territory Battle</h1>
        <input type="text" id="player-name" placeholder="הכנס שם שחקן" />
        <input type="number" id="room-code-input" placeholder="קוד חדר" />
        <button class="btn btn-blue" onclick="joinRoom()">הצטרף</button>
        <button class="btn btn-red" onclick="createRoom()">צור חדר</button>
    </div>

    <!-- 2. Lobby -->
    <div id="lobby-screen" class="screen">
        <h2 id="lbl-lobby-title">לובי המתנה</h2>
        <div class="room-header-container">
            <div class="room-code-box">
                <span id="display-room-code">----</span>
            </div>
        </div>
        <div class="lists-container" style="width:100%; max-width:350px;">
            <div class="team-list" id="list-cops" style="border: 1px solid #3b82f6;">
                <div class="team-title" style="color: #3b82f6;">שוטרים 👮‍♂️</div>
                <div id="players-cops"></div>
            </div>
            <div class="team-list" id="list-thieves" style="border: 1px solid #ef4444;">
                <div class="team-title" style="color: #ef4444;">גנבים 🥷</div>
                <div id="players-thieves"></div>
            </div>
        </div>
        <button class="btn btn-green" id="btn-start-game" style="display: none;" onclick="startGame()">התחל משחק</button>
    </div>

    <!-- 3. Drawing & Compass (Setup ONLY) -->
    <div id="drawing-container">
        <canvas id="drawing-canvas"></canvas>
    </div>

    <div id="map-controls">
        <button class="ctrl-btn" onclick="panMap('up')">↑</button>
        <div class="compass-row">
            <button class="ctrl-btn" onclick="panMap('right')">→</button>
            <button class="ctrl-btn" onclick="panMap('left')">←</button>
        </div>
        <button class="ctrl-btn" onclick="panMap('down')">↓</button>
    </div>

    <div id="zoom-controls">
        <button class="ctrl-btn" onclick="zoomMap(1)">+</button>
        <button class="ctrl-btn" onclick="zoomMap(-1)">-</button>
    </div>

    <div id="setup-ui">
        <div class="setup-msg">הזז את המפה עם החיצים וצייר את הזירה</div>
        <div class="setup-actions">
            <button class="setup-btn btn-red" onclick="clearDrawing()">נקה</button>
            <button class="setup-btn btn-blue" id="btn-confirm-drawing" style="display:none;" onclick="confirmDrawing()">אשר</button>
        </div>
    </div>

    <!-- 4. Game UI -->
    <button id="exit-btn" class="exit-btn" onclick="exitGame()">X</button>
    <div class="header" id="game-header">
        <div class="status-row">
            <span id="gps-status">GPS ❌</span>
            <span id="players-count">שחקנים: 0</span>
        </div>
    </div>

    <div id="briefing-overlay">
        <div id="briefing-timer-text">00:30</div>
        <div id="briefing-status">ממתין...</div>
    </div>

    <div id="map"></div>

    <div id="controls-container">
        <div id="capture-btn-container">
            <button id="capture-btn" onclick="triggerCapture()">תפוס!</button>
        </div>
    </div>

    <!-- Victory Screen -->
    <div id="victory-screen" class="screen">
        <h1 id="victory-text">ניצחון!</h1>
        <button class="btn btn-blue" onclick="location.reload()">חזור ללובי</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
    <script src="audio.js"></script>
    <script src="territory.js"></script>
    <script src="firebase-init.js"></script>
    <script src="lobby.js"></script>
    <script src="game.js"></script>
</body>
</html>
