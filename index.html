<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Territory Battle</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; background-color: #0f172a; color: white; }
        #map { height: 100%; width: 100%; background: #000; }
        .header { position: absolute; top: 10px; left: 10px; right: 10px; padding: 10px; background: rgba(15, 23, 42, 0.9); border-radius: 12px; text-align: center; z-index: 1000; border: 1px solid #38bdf8; }
        #debug-pos { font-size: 10px; color: #facc15; margin-top: 5px; }
        .setup-screen { position: absolute; bottom: 20px; left: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 15px; border-radius: 10px; border: none; font-size: 16px; font-weight: bold; color: white; cursor: pointer; }
        .btn-blue { background: #1e40af; }
        .btn-red { background: #991b1b; }
        #dev-controls { display: none; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 15px; text-align: center; }
        .dev-btn { background: #334155; color: white; border: 1px solid #38bdf8; padding: 15px; margin: 2px; border-radius: 5px; font-size: 20px; width: 60px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size:16px;">Territory Battle</h1>
        <div id="sub-status">בחר תפקיד</div>
        <div id="debug-pos">מיקום: ממתין...</div>
    </div>

    <div id="map"></div>

    <div class="setup-screen" id="ui-container">
        <button class="btn btn-blue" onclick="startAs('cop')">הצטרף לשריפים 👮‍♂️</button>
        <button class="btn btn-red" onclick="startAs('thief')">הצטרף לכנופיה 🥷</button>
    </div>

    <div id="dev-controls">
        <button class="dev-btn" onclick="moveMock('up')">⬆️</button><br>
        <button class="dev-btn" onclick="moveMock('left')">⬅️</button>
        <button class="dev-btn" onclick="moveMock('down')">⬇️</button>
        <button class="dev-btn" onclick="moveMock('right')">➡️</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCC3-6oLBu7OrhnC5Kh6t-mkuo3v4gYN4Q",
            authDomain: "territory-battle-56887.firebaseapp.com",
            databaseURL: "https://territory-battle-56887-default-rtdb.firebaseio.com",
            projectId: "territory-battle-56887",
            storageBucket: "territory-battle-56887.firebasestorage.app",
            messagingSenderId: "1094082573020",
            appId: "1:1094082573020:web:b3ba4455f1636437c33a19"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const playerId = 'player_' + Math.random().toString(36).substr(2, 5);
        let playerRole = null;
        let playerMarkers = {};
        let mockLat = 32.1714;
        let mockLng = 34.9083;
        
        const map = L.map('map', { zoomControl: false }).setView([mockLat, mockLng], 17);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

        db.ref('players/' + playerId).onDisconnect().remove();

        function startAs(role) {
            playerRole = role;
            document.getElementById('ui-container').style.display = 'none';
            document.getElementById('dev-controls').style.display = 'block';
            document.getElementById('sub-status').innerText = role === 'cop' ? 'שריף' : 'גנב';
            updateMockPosition();
            listenToOtherPlayers();
        }

        function moveMock(direction) {
            const step = 0.0002; 
            if (direction === 'up') mockLat += step;
            if (direction === 'down') mockLat -= step;
            if (direction === 'left') mockLng -= step;
            if (direction === 'right') mockLng += step;
            updateMockPosition();
        }

        function updateMockPosition() {
            document.getElementById('debug-pos').innerText = `מיקום: ${mockLat.toFixed(5)}, ${mockLng.toFixed(5)}`;
            map.panTo([mockLat, mockLng]);
            db.ref('players/' + playerId).set({
                role: playerRole,
                lat: mockLat,
                lng: mockLng
            });
        }

        function listenToOtherPlayers() {
            db.ref('players').on('value', (snapshot) => {
                const players = snapshot.val();
                if (!players) return;

                for (let id in playerMarkers) { map.removeLayer(playerMarkers[id]); }
                playerMarkers = {};

                for (let id in players) {
                    const p = players[id];
                    
                    // חוק ראייה: אם אני שוטר, אל תראה גנבים (אלא אם זה אני)
                    if (playerRole === 'cop' && p.role === 'thief' && id !== playerId) continue;

                    const marker = L.marker([p.lat, p.lng]).addTo(map);
                    // הוספת טקסט מעל הנקודה כדי שנזהה
                    marker.bindTooltip(id === playerId ? "אני" : p.role, {permanent: true, direction: 'top'}).openTooltip();
                    
                    playerMarkers[id] = marker;
                }
            });
        }
    </script>
</body>
</html>
